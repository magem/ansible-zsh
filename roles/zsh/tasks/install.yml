---
- name: Install zsh (Fedora / RHEL / CentOS)
  ansible.builtin.dnf:
    name: zsh
    state: present
  when: ansible_os_family == "RedHat"

- name: Install zsh (Debian / Ubuntu)
  ansible.builtin.apt:
    name: zsh
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install zsh (Arch Linux)
  community.general.pacman:
    name: zsh
    state: present
  when: ansible_os_family == "Archlinux"

- name: Verify zsh is installed
  ansible.builtin.command: which zsh
  register: zsh_path
  changed_when: false

- name: Ensure zsh is listed in /etc/shells
  ansible.builtin.lineinfile:
    path: /etc/shells
    line: "{{ zsh_path.stdout }}"
    state: present
  notify: Confirm zsh registered

- name: Set zsh as default shell for {{ zsh_user }}
  ansible.builtin.user:
    name: "{{ zsh_user }}"
    shell: "{{ zsh_path.stdout }}"
  when: zsh_set_default_shell | bool

- name: Install Oh My Zsh for {{ zsh_user }}
  ansible.builtin.shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: "/home/{{ zsh_user }}/.oh-my-zsh"
  become: true
  become_user: "{{ zsh_user }}"
  when: install_oh_my_zsh | bool

- name: Install zsh-autosuggestions
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: "/home/{{ zsh_user }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    depth: 1
  when: install_oh_my_zsh | bool

- name: Install zsh-syntax-highlighting
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting
    dest: "/home/{{ zsh_user }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    depth: 1
  when: install_oh_my_zsh | bool

- name: Copy .zshrc for {{ zsh_user }}
  ansible.builtin.copy:
    src: "{{ zsh_zshrc_source }}"
    dest: "/home/{{ zsh_user }}/.zshrc"
    owner: "{{ zsh_user }}"
    mode: "0644"
  when: zsh_zshrc_source | length > 0
